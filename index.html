<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>抽取裝備卡</title>
    <style>
        :root {
            --bg-color: #1a252f;
            --card-front: #2c3e50;
            --card-back: #4caf50;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 欄 */
            grid-template-rows: repeat(4, 1fr);    /* 4 列 */
            gap: 15px;
            width: 90vw;
            height: 90vh;
        }

        /* 卡片容器：設定 3D 視距 */
        .card {
            perspective: 1000px; 
            cursor: pointer;
        }

        /* 內層容器：處理旋轉動畫 */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; /* 重要：保持 3D 空間 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        /* 點擊後的翻轉類別 */
        .card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* 卡片正面與背面共通樣式 */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* 翻到背面時隱藏正面 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        /* 未翻開的面 (正面) */
        .card-front {
            background-color: var(--card-front);
        }

        /* 已翻開的面 (背面) */
        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg); /* 預先轉 180 度 */
        }

        /* 響應式字體大小 */
        @media (max-width: 600px) {
            .card-face { font-size: 1rem; }
            .grid-container { gap: 5px; }
        }
    </style>
</head>
<body>

<div class="grid-container" id="grid"></div>

<script>
    const cards = ["解答之書", "擴音面罩", "緩衝濾鏡", "藉口生成器", "番茄懷錶", "時間加速器", "​原相機拍立得", "過程日記本", "名牌保養品", "掃羅鎧甲", "大衛機弦", "歌利亞戟"];
    let values = [...cards, ...cards];
    
    // 洗牌 (Fisher-Yates Shuffle)
    for (let i = values.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [values[i], values[j]] = [values[j], values[i]];
    }

    const grid = document.getElementById('grid');

    values.forEach((value, index) => {
        // 建立 HTML 結構
        const cardElement = document.createElement('div');
        cardElement.className = 'card';
        cardElement.innerHTML = `
            <div class="card-inner">
                <div class="card-face card-front">?</div>
                <div class="card-face card-back">${value}</div>
            </div>
        `;

        // 點擊事件
        cardElement.addEventListener('click', () => {
            cardElement.classList.add('is-flipped');
        });

        grid.appendChild(cardElement);
    });
</script>

</body>
</html>
